version: "3.9"

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pricing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data_test:/data

  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - "7700:7700"
    volumes:
      - meili_data_test:/meili_data

  prometheus:
    image: prom/prometheus
    volumes:
      - ./backend/infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data_test:/var/lib/grafana

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CREATE_TOPICS: "order.success:3:1,order.failed:3:1"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  apigateway:
    image: cartcraft-api-gateway-test
    build: ./backend/apigateway
    ports:
      - "4000:4000"
    environment:
      JWT_SECRET: card-craft_bhuvan@2004
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

  authservice:
    image: cartcraft-auth-service-test
    build: ./backend/authservice
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres

  buyerservice:
    image: cartcraft-buyer-service-test
    build: ./backend/buyerdomainservice
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/buyer_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started

  productservice:
    image: cartcraft-productservice-service-test
    build: ./backend/productservice
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/seller_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy

  communicationservice:
    image: cartcraft-communication-service-test
    build: ./backend/communicationservice
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

  orderservice:
    image: cartcraft-order-service-test
    build: ./backend/orderservice
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/order_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy

  searchingservice:
    image: cartcraft-searching-service-test
    build: ./backend/searchingservice
    environment:
      MEILI_MASTER_KEY: 3RzRUv4qnx2iuaUBLT1fVRQjz4zdlYUUSUsuEH8xqRg
      MEILI_HOST: http://meilisearch:7700
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - meilisearch

  sellerservice:
    image: cartcraft-seller-service-test
    build: ./backend/sellerservice
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/seller1_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started

  pricingservice:
    image: cartcraft-pricing-service-test
    build: ./backend/pricingservice
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LANGSMITH_TRACING: "true"
      LANGSMITH_ENDPOINT: https://eu.api.smith.langchain.com
      LANGSMITH_PROJECT: cartcraft
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      productservice:
        condition: service_started

volumes:
  postgres_data_test:
  meili_data_test:
  grafana_data_test:
  redis_data_test: