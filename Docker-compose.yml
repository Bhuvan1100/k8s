services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pricing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
      - ./backend/infra/init-dbs.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data_test:/data

  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - "7700:7700"
    volumes:
      - meili_data_test:/meili_data

  prometheus:
    image: prom/prometheus
    volumes:
      - ./backend/infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data_test:/var/lib/grafana

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CREATE_TOPICS: "order.success:3:1,order.failed:3:1"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  apigateway:
    build: ./backend/apiGateWay
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      JWT_SECRET: card-craft_bhuvan@2004
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://authservice:4001
      BUYER_SERVICE_URL: http://buyerservice:4002
      PRODUCT_SERVICE_URL: http://productservice:4003
      ORDER_SERVICE_URL: http://orderservice:4004
      SELLER_SERVICE_URL: http://sellerservice:4005
      SEARCH_SERVICE_URL: http://searchingservice:4006
      PRICING_SERVICE_URL: http://pricingservice:4007
      COMMUNICATION_SERVICE_URL: http://communicationservice:4008
    depends_on:
      - redis

  authservice:
    build: ./backend/authService
    environment:
      PORT: 4001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: auth_db
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  buyerservice:
    build: ./backend/buyerService
    environment:
      PORT: 4002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: buyer_db
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/buyer_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started

  productservice:
    build: ./backend/productservice
    environment:
      PORT: 4003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: product_db
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/product_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started

  communicationservice:
    build: ./backend/communicationService
    environment:
      PORT: 4008
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_started

  orderservice:
    build: ./backend/orderService
    environment:
      PORT: 4004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: order_db
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/order_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started

  searchingservice:
    build: ./backend/searchingservice
    environment:
      PORT: 4006
      MEILI_HOST: meilisearch
      MEILI_PORT: 7700
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      meilisearch:
        condition: service_started
      redis:
        condition: service_started

  sellerservice:
    build: ./backend/sellerservice
    environment:
      PORT: 4005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: seller_db
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/seller_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started

  pricingservice:
    build: ./backend/pricingservice
    environment:
      PORT: 4007
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: pricing_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GEMINI_API_KEY: AIzaSyDFT9n0RdkX2g0Tt2A2moMMHZzcWRXz6tw
      LANGSMITH_TRACING: "true"
      LANGSMITH_ENDPOINT: https://eu.api.smith.langchain.com
      LANGSMITH_API_KEY: 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
      LANGSMITH_PROJECT: cartcraft
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      productservice:
        condition: service_started

volumes:
  postgres_data_test:
  meili_data_test:
  grafana_data_test:
  redis_data_test:
