name: Auth Service CI/CD

on:
  push:
    branches:
      - backend-deploy
    paths:
      - 'backend/authService/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t bhuvan0fficial/cartcraft-authservice:${{ github.sha }} ./backend/authService
          docker push bhuvan0fficial/cartcraft-authservice:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo kubectl set image deployment/authservice \
            authservice=bhuvan0fficial/cartcraft-authservice:${{ github.sha }} \
            -n cartcraft