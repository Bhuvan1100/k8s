name: SellerService CI/CD

on:
  push:
    branches:
      - backend-deploy
    paths:
      - 'backend/sellerservice/**'
      - 'k8s/config/sellerservice.yaml'
      - 'k8s/secret/sellerservice.yaml'
      - 'k8s/services/sellerservice.yaml'
      - 'k8s/deployment/sellerservice.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t bhuvan0fficial/cartcraft-sellerservice:${{ github.sha }} ./backend/sellerservice
          docker push bhuvan0fficial/cartcraft-sellerservice:${{ github.sha }}

      - name: Copy Kubernetes manifests to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s"
          target: "/tmp/cartcraft-${{ github.sha }}"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            K8S_DIR="/tmp/cartcraft-${{ github.sha }}/k8s"

            sudo kubectl apply -f "$K8S_DIR/config/sellerservice.yaml"
            sudo kubectl apply -f "$K8S_DIR/secret/sellerservice.yaml"
            sudo kubectl apply -f "$K8S_DIR/services/sellerservice.yaml"

            sudo kubectl set image --local -f "$K8S_DIR/deployment/sellerservice.yaml" \
              sellerservice=bhuvan0fficial/cartcraft-sellerservice:${{ github.sha }} \
              -o yaml | sudo kubectl apply -f -

            sudo kubectl rollout status deployment/sellerservice -n cartcraft --timeout=180s
