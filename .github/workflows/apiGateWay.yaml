name: API Gateway CI/CD

on:
  push:
    branches:
      - backend-deploy
    paths:
      - 'backend/apiGateWay/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3️⃣ Build and push image with commit SHA
      - name: Build and Push Docker Image
        run: |
          docker build -t bhuvan0fficial/cartcraft-apigateway:${{ github.sha }} ./backend/apiGateWay
          docker push bhuvan0fficial/cartcraft-apigateway:${{ github.sha }}

      # 4️⃣ SSH into EC2 and update deployment
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            kubectl set image deployment/api-gateway \
            api-gateway=bhuvan0fficial/cartcraft-apigateway:${{ github.sha }} \
            -n cartcraft