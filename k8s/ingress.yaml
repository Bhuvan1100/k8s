apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: cartcraft-ingress
  namespace: cartcraft

  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"

spec:
  ingressClassName: nginx

  tls:
    - hosts:
        - buyer.cartcraftio.in
        - seller.cartcraftio.in
        - admin.cartcraftio.in
        - api.cartcraftio.in
      secretName: cartcraft-tls

  rules:

    # Buyer Frontend
    - host: buyer.cartcraftio.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cc-buyer-service
                port:
                  number: 80

    # Seller Frontend
    - host: seller.cartcraftio.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cc-seller-service
                port:
                  number: 80

    # Admin Frontend
    - host: admin.cartcraftio.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cc-admin-service
                port:
                  number: 80

    # API Gateway
    - host: api.cartcraftio.in
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 4000