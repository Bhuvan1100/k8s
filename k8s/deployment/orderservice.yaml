apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderservice
  namespace: cartcraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orderservice
  template:
    metadata:
      labels:
        app: orderservice
    spec:
      containers:
        - name: orderservice
          image: bhuvan0fficial/cartcraft-orderservice:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 4004

          envFrom:
            - configMapRef:
                name: order-config
            - secretRef:
                name: order-secret

          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 40
            periodSeconds: 20

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
