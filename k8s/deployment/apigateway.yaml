apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: cartcraft
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: bhuvan0fficial/cartcraft-apigateway:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 4000

          envFrom:
            - configMapRef:
                name: apigateway-config
            - secretRef:
                name: apigateway-secret

          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 50
            periodSeconds: 20

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"