apiVersion: apps/v1
kind: Deployment
metadata:
  name: buyerservice
  namespace: cartcraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buyerservice
  template:
    metadata:
      labels:
        app: buyerservice
    spec:
      containers:
        - name: buyerservice
          image: bhuvan0fficial/cartcraft-buyerdomainservice:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 4002

          envFrom:
            - configMapRef:
                name: buyer-config
            - secretRef:
                name: buyer-secret

          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 50
            periodSeconds: 20

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"